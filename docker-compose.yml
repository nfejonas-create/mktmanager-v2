version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mktmanager-v2-db
    environment:
      POSTGRES_USER: mktmanager
      POSTGRES_PASSWORD: mktmanager_pass
      POSTGRES_DB: mktmanager_v2
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mktmanager -d mktmanager_v2"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mktmanager-v2-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: