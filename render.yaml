services:
  - type: web
    name: postflow-backend
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma migrate deploy && npm run build
    postDeployCommand: npm run migrate:encryption
    startCommand: node dist/api/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: postflow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: mktmonager
          type: keyvalue
          property: connectionString
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://web-14qxg8bcg-jonas-breitenbachs-projects.vercel.app
    healthCheckPath: /health

databases:
  - name: postflow-db
    databaseName: postflow
    user: postflow
    plan: free
